name: SEO Site — Weekly Content Generation

on:
  schedule:
    - cron: "0 2 * * 0"   # Every Sunday 02:00 UTC
  workflow_dispatch:
    inputs:
      articles_count:
        description: "Number of articles to generate (default: 5)"
        required: false
        default: "5"

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true        # pulls Hugo PaperMod theme
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "business2_seo/requirements.txt"

      - name: Install Python dependencies
        run: pip install -r business2_seo/requirements.txt

      - name: Run SEO content pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ARTICLES_PER_RUN: ${{ inputs.articles_count || '5' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        working-directory: business2_seo
        run: python orchestrator.py

      - name: Commit new articles and state updates
        if: always()
        run: |
          git config user.name "SEO Content Bot"
          git config user.email "bot@github-actions"
          git add business2_seo/hugo_site/content/posts/ \
                  business2_seo/data/state.json \
                  business2_seo/data/keywords.csv \
                  business2_seo/logs/ || true
          git diff --staged --quiet || git commit -m "content: add $(date +%Y-%m-%d) batch [skip ci]"
          git pull --rebase origin main || true
          git push || true

      - name: Setup Hugo
        if: always()
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.146.0"
          extended: true

      - name: Build Hugo site
        if: always()
        run: |
          cd business2_seo/hugo_site
          hugo --minify --baseURL "https://sutraflow.org/"

      - name: Deploy to Cloudflare Pages
        if: always()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy business2_seo/hugo_site/public --project-name=sutraflow-seo --commit-dirty=true

      - name: Submit new URLs to IndexNow (Bing + Yandex)
        if: always()
        run: |
          URLS=$(find business2_seo/hugo_site/content/posts -name "*.md" \
            | xargs grep -l "$(date +%Y-%m-%d)" 2>/dev/null \
            | sed 's|business2_seo/hugo_site/content/posts/||;s|\.md||' \
            | jq -R '"https://sutraflow.org/posts/" + . + "/"' | jq -s '.')
          if [ -n "$URLS" ] && [ "$URLS" != "[]" ] && [ "$URLS" != "null" ]; then
            curl -s -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json" \
              -d "{\"host\":\"sutraflow.org\",\"key\":\"sutraflowd5258b61b819e04f\",\"keyLocation\":\"https://sutraflow.org/sutraflowd5258b61b819e04f.txt\",\"urlList\":$URLS}" \
              -w "\nIndexNow: %{http_code}" || true
          else
            echo "No new URLs today"
          fi
