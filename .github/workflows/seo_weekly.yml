name: SEO Site — Weekly Content Generation

on:
  schedule:
    - cron: "0 2 * * 0"   # Every Sunday 02:00 UTC
  workflow_dispatch:
    inputs:
      articles_count:
        description: "Number of articles to generate (default: 5)"
        required: false
        default: "5"

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true        # pulls Hugo PaperMod theme
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "business2_seo/requirements.txt"

      - name: Install Python dependencies
        run: pip install -r business2_seo/requirements.txt

      - name: Run SEO content pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ARTICLES_PER_RUN: ${{ inputs.articles_count || '5' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        working-directory: business2_seo
        run: python orchestrator.py

      - name: Commit new articles and state updates
        if: always()
        run: |
          git config user.name "SEO Content Bot"
          git config user.email "bot@github-actions"
          git add business2_seo/hugo_site/content/posts/ \
                  business2_seo/data/state.json \
                  business2_seo/data/keywords.csv \
                  business2_seo/logs/ || true
          git diff --staged --quiet || git commit -m "content: add $(date +%Y-%m-%d) batch [skip ci]"
          git push

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.128.0"
          extended: true

      - name: Build Hugo site
        run: |
          cd business2_seo/hugo_site
          hugo --minify --baseURL "https://sutraflow.org/"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy business2_seo/hugo_site/public --project-name=sutraflow-seo --commit-dirty=true
