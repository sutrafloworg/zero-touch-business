name: LocalRank Sentinel — Weekly Scan

on:
  schedule:
    - cron: "0 13 * * 1"   # Every Monday 1pm UTC (8am ET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan-and-outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "business3_local_seo/requirements.txt"

      - name: Install Python dependencies
        run: pip install -r business3_local_seo/requirements.txt

      - name: Run Local SEO pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          STRIPE_PAYMENT_URL_MONITORING: ${{ secrets.STRIPE_PAYMENT_URL_MONITORING }}
          STRIPE_PAYMENT_URL_AUDIT: ${{ secrets.STRIPE_PAYMENT_URL_AUDIT }}
        working-directory: business3_local_seo
        run: python orchestrator.py

      - name: Commit state and ranking history updates
        if: always()
        run: |
          git config user.name "LocalRank Bot"
          git config user.email "bot@github-actions"
          git add business3_local_seo/data/state.json \
                  business3_local_seo/data/rankings_history.json \
                  business3_local_seo/data/contacts.json \
                  business3_local_seo/data/pending_reports.json \
                  business3_local_seo/logs/ || true
          git diff --staged --quiet || git commit -m "local-seo: update rankings $(date +%Y-%m-%d) [skip ci]"
          git pull --rebase origin main || true
          git push || true
