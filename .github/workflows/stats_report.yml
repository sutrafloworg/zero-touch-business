name: Stats Report (On Demand)

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: business2_seo/requirements.txt

      - run: pip install -r business2_seo/requirements.txt

      - name: Send stats report
        env:
          KIT_API_SECRET: ${{ secrets.KIT_API_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        working-directory: business2_seo
        run: python run_stats.py
