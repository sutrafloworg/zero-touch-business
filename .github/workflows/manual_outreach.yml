name: Manual Teaser Blast
on:
  workflow_dispatch:

jobs:
  manual-outreach:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd business3_local_seo
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Manual Outreach Script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          cd business3_local_seo
          python send_teasers_manual.py

      - name: Commit registered pending reports
        run: |
          git config user.name "Search Sentinel Bot"
          git config user.email "bot@sutraflow.org"
          git add business3_local_seo/data/pending_reports.json
          git commit -m "chore: updated pending_reports from manual outreach" || echo "No changes to commit"
          git push origin main
