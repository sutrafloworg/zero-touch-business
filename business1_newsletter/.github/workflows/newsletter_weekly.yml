name: Newsletter Weekly Automation

on:
  # Runs every Tuesday at 07:00 UTC (9am CET, 2am EST)
  schedule:
    - cron: "0 7 * * 2"

  # Also allows manual trigger from GitHub Actions UI for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate content but don't send)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write   # needed to commit state.json updates back to repo

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "business1_newsletter/requirements.txt"

      - name: Install dependencies
        run: pip install -r business1_newsletter/requirements.txt

      - name: Run newsletter pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KIT_API_SECRET: ${{ secrets.KIT_API_SECRET }}
          KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
          KIT_FORM_ID: ${{ secrets.KIT_FORM_ID }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run }}
        working-directory: business1_newsletter
        run: python orchestrator.py

      - name: Commit updated state back to repo
        if: always()   # run even if pipeline had errors (to save failure state)
        run: |
          git config user.name "Newsletter Bot"
          git config user.email "bot@github-actions"
          git add business1_newsletter/data/state.json business1_newsletter/logs/ || true
          git diff --staged --quiet || git commit -m "chore: update newsletter state [skip ci]"
          git push
